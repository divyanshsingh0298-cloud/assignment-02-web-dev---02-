<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Async Weather Tracker</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<h1>🌤 Async Weather Tracker</h1>

<div class="container">

    <div class="card">
        <h3>Search City</h3>

        <input type="text" id="city" placeholder="Delhi, London...">
        <button onclick="getWeather()">Search</button>

        <h4>Search History</h4>
        <ul id="history"></ul>
    </div>

    <div class="card">
        <h3>Weather Info</h3>
        <div id="weather">
            No data yet
        </div>
    </div>

</div>

<div class="console">
    <h3>Console – Event Loop</h3>
    <div id="log"></div>
</div>

<script src="script.js"></script>

</body>
</html>
